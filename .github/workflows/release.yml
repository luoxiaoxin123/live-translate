# Publish a GitHub Release + APK when you push a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# Or create a Release on the GitHub website with tag v0.1.0
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          # v0.1.0 -> 0.1.0
          VERSION_NAME="${TAG#v}"
          # Monotonic code for this repo (run number is fine for GitHub-only releases)
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using versionName=${VERSION_NAME} versionCode=${VERSION_CODE}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install \
            "platforms;android-37.0" \
            "build-tools;37.0.0" \
            "platform-tools"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: |
          ./gradlew :app:assembleRelease \
            -PVERSION_NAME="${{ steps.ver.outputs.version_name }}" \
            -PVERSION_CODE="${{ steps.ver.outputs.version_code }}" \
            --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "path=${APK}" >> "$GITHUB_OUTPUT"
          ls -lh "$APK"
          cp "$APK" "LiveTranslate-${{ steps.ver.outputs.version_name }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Live Translate ${{ steps.ver.outputs.version_name }}
          generate_release_notes: true
          files: |
            LiveTranslate-${{ steps.ver.outputs.version_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
